# Release on version tag (v0.2.5, ...): re-run checks, build the Store zip,
# attach it to a GitHub Release. The tag must match package.json version.
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Check tag matches package.json version
        run: |
          PKG_V="$(node -p "require('./package.json').version")"
          if [ "v$PKG_V" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version v$PKG_V" >&2
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build Store zip
        run: bash scripts/build-store-zip.sh

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
